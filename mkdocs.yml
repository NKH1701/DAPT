site_name: DAPT 
repo_name: DAPT
repo_url: https://github.com/NKH1701/DAPT
site_description: Transcriptional Response Predictor
site_author: NG Ka Ho

theme:
  name: material
  palette:
    # This gives it a clean, modern look. You can change primary to 'blue', 'teal', etc.
    primary: indigo 
    accent: deep purple

nav:
  - 🏠 Home: index.md
  - 📥 Installation: installation.md
  - 📖 Tutorial: tutorial.md
  - 📚 API Reference: api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences